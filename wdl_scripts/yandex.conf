include required(classpath("application"))

engine {
  filesystems {
    http {
      enabled: true
    }
  }
}


backend {
  default = "Docker"

  providers {

    Local {
      actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
      config {
		    concurrent-job-limit = 40
		    run-in-background = true
		    root = "/home/cromwell/cromwell-executions"
      }
    }

    Docker {
      actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
      config {
        run-in-background = true
        runtime-attributes = "String docker"
		    root = "cromwell-executions"
		    dockerRoot = "/cromwell-executions"
        submit-docker = "docker run --rm -i --entrypoint ${job_shell} -v ${cwd}:${docker_cwd} ${docker} < ${script}"
      
	  
	    # File system configuration.
        filesystems {

          # For SFS backends, the "local" configuration specifies how files are handled.
          local {

            # Try to hard link (ln), then soft-link (ln -s), and if both fail, then copy the files.
            localization: [
              "hard-link", "cached-copy", "copy"
            ]
          }
        }
	    }
	  }

    DockerCPU {
      actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
      config {
        run-in-background = true
        runtime-attributes = """
          String docker
          String cpus
          """
		    root = "cromwell-executions"
		    dockerRoot = "/cromwell-executions"
        submit-docker = """
          docker run --cpuset-cpus "${cpus}" --rm -i --entrypoint ${job_shell} -v ${cwd}:${docker_cwd} ${docker} < ${script}
          """
      
	  
	    # File system configuration.
        filesystems {

          # For SFS backends, the "local" configuration specifies how files are handled.
          local {

            # Try to hard link (ln), then soft-link (ln -s), and if both fail, then copy the files.
            localization: [
              "hard-link", "cached-copy", "copy"
            ]
          }
        }
	    }
	  }

    DockerAnnovar {
      actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
      config {
        concurrent-job-limit = 20
        run-in-background = true
        runtime-attributes = "String docker"
		    root = "cromwell-executions"
		    dockerRoot = "/cromwell-executions"
		    submit-docker = "docker run --rm -i --entrypoint ${job_shell} -v ${cwd}:${docker_cwd} -v /s3/ngs24-ref/humandb:/opt/annovar/humandb ${docker} < ${script}"
      }
	}

    DockerBWA {
      actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
      config {
        concurrent-job-limit = 6
        run-in-background = true
        runtime-attributes = """
          String docker
          String cpus
          """
		    root = "cromwell-executions"
		    dockerRoot = "/cromwell-executions"
		    submit-docker = """
          docker run --cpuset-cpus "${cpus}" --rm -i --entrypoint ${job_shell} -v ${cwd}:${docker_cwd} -v /s3/ngs24-ref/hg38:/opt/hg38 ${docker} < ${script}
          """
      }
	}


  }
}



system {
    max-concurrent-workflows = 1
    max-workflow-launch-count = 5
    io {
    # Global Throttling - This is mostly useful for GCS and can be adjusted to match
    # the quota availble on the GCS API
    number-of-requests = 2000
    per = 100 seconds
    number-of-attempts = 10
    }
    job-rate-control {
        jobs = 1
        per = 1 second
    }
    hog-safety {
        hog-factor = 1
        workflow-option = "hogGroup"
        token-log-interval-seconds = 0
    }
}

